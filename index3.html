<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rive Wheel</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
}

.rive-container {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.35s ease;
}

.rive-container.loaded {
  opacity: 1;
}

#riveCanvas {
  height: 80vh;
  width: auto;
  max-width: 100%;
  display: block;
}

.preloader {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0f0f;
  z-index: 10;
  transition: opacity 0.35s ease, visibility 0.35s ease;
}

.preloader.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loader-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid rgba(255,255,255,0.18);
  border-top-color: #ffffff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

.loader-text {
  color: #ffffff;
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.85;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
.rive-container {
  position: relative;
}

#riveCanvas {
  position: relative;
  z-index: 1;
}


</style>
</head>
<body>
<div class="page">
  <div class="preloader" id="preloader">
    <div class="loader-wrap">
      <div class="spinner"></div>
      <div class="loader-text">Loading</div>
    </div>
  </div>

  <div class="rive-container" id="riveContainer">
    <canvas id="riveCanvas"></canvas>

    <button id="spinBtn" style="
  position:absolute;
  left:50%;
  bottom:40px;
  transform:translateX(-50%);
  z-index:20;
  padding:12px 22px;
  border:none;
  border-radius:12px;
  background:#434EF0;
  color:white;
  font-size:18px;
  cursor:pointer;
">
  Spin
</button>
  </div>
</div>

<script src="https://unpkg.com/@rive-app/webgl2"></script>
<script>
const canvas = document.getElementById("riveCanvas");
const preloader = document.getElementById("preloader");
const riveContainer = document.getElementById("riveContainer");
const spinBtn = document.getElementById("spinBtn");

const rewards = [
  { reward_type: "dollars", reward_number: "$50" },
  { reward_type: "dollars", reward_number: "$10" },
  { reward_type: "dollars", reward_number: "$0.50" },
  { reward_type: "dollars", reward_number: "$1" },
  { reward_type: "dollars", reward_number: "$2" },
  { reward_type: "dollars", reward_number: "$6" },
  { reward_type: "dollars", reward_number: "$0.4" },
  { reward_type: "dollars", reward_number: "$0.1" }
];

const forcedWinner = null;

let riveInstance = null;
let vmi = null;
let isSpinning = false;
let absoluteRawRotation = 0;

// -------------------------------
// Rive config
// -------------------------------
const RIVE_SRC = "fortune_wheel2.riv";
const ARTBOARD = "wheeloffortune";
const STATE_MACHINE = "State Machine 2";

const ROTATION_PROP = "rotation";
const SELECTED_INDEX_PROP = "selected_index";
const CLICK_TRIGGER = "click";
const SHOW_REWARD_TRIGGER = "showReward";

const BLEND_MIN = 0;
const BLEND_MAX = 100;

// -------------------------------
// Wheel config
// -------------------------------
const WEDGE_COUNT = 8;
const WEDGE_SIZE = 1 / WEDGE_COUNT;

let CLOCKWISE = false;
let VISUAL_OFFSET = 0;

// spin feel
const MIN_FULL_TURNS = 5;
const MAX_FULL_TURNS = 7;

const SPIN_DURATION_MIN = 4600;
const SPIN_DURATION_MAX = 5800;

// landing safety
const SAFE_WEDGE_PORTION = 0.72;
const EDGE_NEAR_RATIO = 0.10;
const SETTLE_AMOUNT_RATIO = 0.014;

// velocity curve shape
const ACCEL_PORTION = 0.22;   // how long it speeds up
const PEAK_SHARPNESS = 1.0;   // 1 = balanced, >1 sharper peak, <1 softer
const DECEL_POWER = 2.35;     // bigger = longer soft slowdown

// -------------------------------
// Helpers
// -------------------------------
function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randomFloat(min, max) {
  return min + Math.random() * (max - min);
}

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function wrap01(v) {
  return ((v % 1) + 1) % 1;
}

function circularDistance(a, b) {
  const d = Math.abs(a - b);
  return Math.min(d, 1 - d);
}

function signedCircularDelta(from, to) {
  let d = wrap01(to) - wrap01(from);
  if (d > 0.5) d -= 1;
  if (d < -0.5) d += 1;
  return d;
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function nextFrame() {
  return new Promise(resolve => requestAnimationFrame(resolve));
}

// -------------------------------
// ViewModel helpers
// -------------------------------
function setString(vmi, path, value) {
  vmi.string(path).value = String(value);
}

function setNumber(vmi, path, value) {
  vmi.number(path).value = Number(value);
}

function getNumber(vmi, path) {
  return Number(vmi.number(path).value);
}

function fireTrigger(vmi, path) {
  vmi.trigger(path).trigger();
}

// -------------------------------
// Rotation mapping
// -------------------------------
function rawToBlend(raw) {
  return BLEND_MIN + wrap01(raw) * (BLEND_MAX - BLEND_MIN);
}

function blendToRaw(blend) {
  return wrap01((blend - BLEND_MIN) / (BLEND_MAX - BLEND_MIN));
}

function rawToVisual(raw) {
  const dir = CLOCKWISE ? wrap01(raw) : wrap01(1 - raw);
  return wrap01(dir + VISUAL_OFFSET);
}

function visualToRaw(visual) {
  const shifted = wrap01(visual - VISUAL_OFFSET);
  return CLOCKWISE ? shifted : wrap01(1 - shifted);
}

function getVisualCenter(index) {
  return wrap01((index - 0.5) * WEDGE_SIZE);
}

function getNearestIndex(raw) {
  const visual = rawToVisual(raw);

  let best = 1;
  let bestDist = Infinity;

  for (let i = 1; i <= WEDGE_COUNT; i++) {
    const center = getVisualCenter(i);
    const d = circularDistance(visual, center);
    if (d < bestDist) {
      bestDist = d;
      best = i;
    }
  }

  return best;
}

function getRandomTarget(index) {
  const center = getVisualCenter(index);
  const half = WEDGE_SIZE * SAFE_WEDGE_PORTION * 0.5;
  const visual = wrap01(center + randomFloat(-half, half));
  return visualToRaw(visual);
}

function settleIfEdge(raw) {
  const visual = rawToVisual(raw);
  const index = getNearestIndex(raw);
  const center = getVisualCenter(index);

  const delta = signedCircularDelta(center, visual);
  const edgeLimit = (WEDGE_SIZE / 2) - (WEDGE_SIZE * EDGE_NEAR_RATIO);
  const settle = WEDGE_SIZE * SETTLE_AMOUNT_RATIO;

  let v = visual;

  if (Math.abs(delta) > edgeLimit) {
    v = delta > 0
      ? wrap01(visual - settle)
      : wrap01(visual + settle);
  }

  return visualToRaw(v);
}

function setWheelRaw(rawAbsolute) {
  absoluteRawRotation = rawAbsolute;
  setNumber(vmi, ROTATION_PROP, rawToBlend(rawAbsolute));
}

// -------------------------------
// REAL velocity profile
// -------------------------------
// Returns relative angular velocity at normalized time t.
// The wheel speeds up until peak, then continuously slows down.
function velocityProfile(t) {
  t = clamp01(t);

  if (t <= 0) return 0;
  if (t >= 1) return 0;

  const a = ACCEL_PORTION;

  if (t < a) {
    const u = t / a;
    return Math.pow(Math.sin((u * Math.PI) / 2), 1 / PEAK_SHARPNESS);
  }

  const u = (t - a) / (1 - a);
  return Math.pow(1 - u, DECEL_POWER);
}

// Numerically integrate velocity profile from 0..t
function integratedProgress(t, steps = 140) {
  t = clamp01(t);
  if (t === 0) return 0;
  if (t === 1) return 1;

  let areaToT = 0;
  let areaTotal = 0;

  for (let i = 0; i < steps; i++) {
    const x0 = i / steps;
    const x1 = (i + 1) / steps;
    const xm = (x0 + x1) / 2;
    const strip = velocityProfile(xm) * (x1 - x0);

    areaTotal += strip;

    if (x1 <= t) {
      areaToT += strip;
    } else if (x0 < t) {
      const partialWidth = t - x0;
      areaToT += velocityProfile((x0 + t) / 2) * partialWidth;
    }
  }

  return areaTotal > 0 ? areaToT / areaTotal : 0;
}

async function animateVelocitySpin({
  startRaw,
  finalRawAbsolute,
  duration,
  onUpdate
}) {
  return new Promise((resolve) => {
    const delta = finalRawAbsolute - startRaw;
    const startTime = performance.now();

    function frame(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const progress = integratedProgress(t);
      const raw = startRaw + delta * progress;

      onUpdate(raw);

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        resolve();
      }
    }

    requestAnimationFrame(frame);
  });
}

// -------------------------------
// Rewards injection
// -------------------------------
function injectRewards() {
  rewards.forEach((r, i) => {
    const slot = `slot${i + 1}`;
    setString(vmi, `${slot}/reward_type`, r.reward_type);
    setString(vmi, `${slot}/reward_number`, r.reward_number);
  });
}

// -------------------------------
// Spin logic
// -------------------------------
async function spinWheel() {
  if (!vmi || isSpinning) return;

  isSpinning = true;
  if (spinBtn) spinBtn.disabled = true;

  try {
    const winner = forcedWinner ?? randomInt(1, rewards.length);

    fireTrigger(vmi, CLICK_TRIGGER);
    await nextFrame();

    const currentWrapped = blendToRaw(getNumber(vmi, ROTATION_PROP));
    const targetRaw = getRandomTarget(winner);
    const fullTurns = randomInt(MIN_FULL_TURNS, MAX_FULL_TURNS);

    let finalRawAbsolute = absoluteRawRotation + fullTurns + (targetRaw - currentWrapped);

    if (finalRawAbsolute <= absoluteRawRotation) {
      finalRawAbsolute += 1;
    }

    const duration = randomInt(SPIN_DURATION_MIN, SPIN_DURATION_MAX);

    await animateVelocitySpin({
      startRaw: absoluteRawRotation,
      finalRawAbsolute,
      duration,
      onUpdate: (val) => {
        setWheelRaw(val);
      }
    });

    let finalWrapped = wrap01(absoluteRawRotation);
    const settled = settleIfEdge(finalWrapped);

    if (circularDistance(finalWrapped, settled) > 0.0001) {
      const settleDelta = signedCircularDelta(finalWrapped, settled);
      const settleStart = absoluteRawRotation;
      const settleEnd = absoluteRawRotation + settleDelta;
      const settleTime = 90;

      await new Promise((resolve) => {
        const startTime = performance.now();

        function frame(now) {
          const t = Math.min((now - startTime) / settleTime, 1);
          const eased = easeOutCubic(t);
          setWheelRaw(settleStart + (settleEnd - settleStart) * eased);

          if (t < 1) requestAnimationFrame(frame);
          else resolve();
        }

        requestAnimationFrame(frame);
      });

      finalWrapped = wrap01(absoluteRawRotation);
    }

    const finalIndex = getNearestIndex(finalWrapped);
    setNumber(vmi, SELECTED_INDEX_PROP, finalIndex);

    await nextFrame();
    fireTrigger(vmi, SHOW_REWARD_TRIGGER);

    console.log({
      winner,
      finalIndex,
      currentWrapped,
      targetRaw,
      finalWrapped
    });

  } catch (e) {
    console.error(e);
  } finally {
    isSpinning = false;
    if (spinBtn) spinBtn.disabled = false;
  }
}

// -------------------------------
// Init
// -------------------------------
riveInstance = new rive.Rive({
  src: RIVE_SRC,
  canvas,
  artboard: ARTBOARD,
  stateMachines: STATE_MACHINE,
  autoplay: true,
  autoBind: true,

  onLoad: () => {
    riveInstance.resizeDrawingSurfaceToCanvas();

    requestAnimationFrame(() => {
      if (riveContainer) riveContainer.classList.add("loaded");
      if (preloader) preloader.classList.add("hidden");
    });

    vmi = riveInstance.viewModelInstance;

    injectRewards();

    absoluteRawRotation = 0;
    setWheelRaw(absoluteRawRotation);
    setNumber(vmi, SELECTED_INDEX_PROP, 1);

    console.log("Rive ready");
  }
});

window.addEventListener("resize", () => {
  if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
});

if (spinBtn) {
  spinBtn.addEventListener("click", (e) => {
    e.preventDefault();
    spinWheel();
  });
}
</script>
</body>
</html>
