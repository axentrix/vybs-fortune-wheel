<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rive Wheel</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
}

.rive-container {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.35s ease;
}

.rive-container.loaded {
  opacity: 1;
}

#riveCanvas {
  height: 80vh;
  width: auto;
  max-width: 100%;
  display: block;
}

.preloader {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0f0f;
  z-index: 10;
  transition: opacity 0.35s ease, visibility 0.35s ease;
}

.preloader.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loader-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid rgba(255,255,255,0.18);
  border-top-color: #ffffff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

.loader-text {
  color: #ffffff;
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.85;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>
<div class="page">
  <div class="preloader" id="preloader">
    <div class="loader-wrap">
      <div class="spinner"></div>
      <div class="loader-text">Loading</div>
    </div>
  </div>

  <div class="rive-container" id="riveContainer">
    <canvas id="riveCanvas"></canvas>
  </div>
</div>

<script src="https://unpkg.com/@rive-app/webgl2"></script>
<script>
const canvas = document.getElementById("riveCanvas");
const preloader = document.getElementById("preloader");
const riveContainer = document.getElementById("riveContainer");

const rewards = [
  { reward_type: "dollars", reward_number: "$1" },
  { reward_type: "dollars", reward_number: "$2" },
  { reward_type: "dollars", reward_number: "$3" },
  { reward_type: "dollars", reward_number: "$4" },
  { reward_type: "dollars", reward_number: "$5" },
  { reward_type: "dollars", reward_number: "$6" },
  { reward_type: "dollars", reward_number: "$7" },
  { reward_type: "dollars", reward_number: "$8" }
];

let riveInstance;
let vmi;

let isSpinning = false;
let currentRotation = 0;
let lastEdgeIndex = -1;

let rewardLocked = false;
let lockedAngle = 0;

const SLOT_OFFSET = 90;

// -------------------------
// ViewModel helpers
// -------------------------
function setString(path, value) {
  const prop = vmi?.string(path);
  if (prop) prop.value = String(value);
  else console.warn("Missing string:", path);
}

function setNumber(path, value) {
  if (path === "rotation") {
    if (rewardLocked && Math.abs(Number(value)) < 0.001) {
      console.warn("Blocked rotation reset to 0");
      value = lockedAngle;
    }

    console.log("SET ROTATION:", value);
  }

  const prop = vmi?.number(path);
  if (prop) prop.value = Number(value);
  else console.warn("Missing number:", path);
}

function setBoolean(path, value) {
  const prop = vmi?.boolean(path);
  if (prop) prop.value = Boolean(value);
  else console.warn("Missing boolean:", path);
}

function fireTrigger(path) {
  const prop = vmi?.trigger(path);
  if (prop) prop.trigger();
  else console.warn("Missing trigger:", path);
}

// -------------------------
// Rewards
// -------------------------
function injectRewards() {
  rewards.forEach((reward, index) => {
    const slot = index + 1;
    setString(`slot${slot}/reward_type`, reward.reward_type);
    setString(`slot${slot}/reward_number`, reward.reward_number);
  });

  console.log("Rewards populated");
}

function setSelectedReward(slot) {
  const reward = rewards[slot - 1];

  setNumber("selected_index", slot);
  setString("selectedSlot/reward_type", reward.reward_type);
  setString("selectedSlot/reward_number", reward.reward_number);

  console.log("JS selected reward:", slot, reward);
}

// -------------------------
// Easing
// -------------------------
function easeInCubic(t) {
  return t * t * t;
}

function linear(t) {
  return t;
}

function easeOutQuart(t) {
  return 1 - Math.pow(1 - t, 4);
}

// -------------------------
// Rotation
// -------------------------
function normalizeAngle(value) {
  return ((value % 360) + 360) % 360;
}

function setWheelRotation(value, allowTick = true) {
  currentRotation = value;

  const displayRotation = normalizeAngle(value);
  setNumber("rotation", displayRotation);

  const edgeIndex = Math.floor(displayRotation / 45);

  if (allowTick && edgeIndex !== lastEdgeIndex) {
    lastEdgeIndex = edgeIndex;
    fireTick();
  }
}

function animateRotation(from, to, duration, ease) {
  return new Promise(resolve => {
    const startTime = performance.now();

    function frame(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = ease(t);
      const value = from + (to - from) * eased;

      setWheelRotation(value, true);

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        resolve();
      }
    }

    requestAnimationFrame(frame);
  });
}

function getSlotFromAngle(angle) {
  let a = ((angle + SLOT_OFFSET) % 360 + 360) % 360;
  a = (a + 22.5) % 360;
  return Math.floor(a / 45) + 1;
}

function fireTick() {
  fireTrigger("tick");
}

// -------------------------
// Spin
// -------------------------
async function startSpin() {
  if (!vmi || isSpinning) return;

  isSpinning = true;
  rewardLocked = false;
  lockedAngle = 0;
  lastEdgeIndex = -1;

  setBoolean("slow_down", false);
  setBoolean("stop_spin", false);

  fireTrigger("click");

  const p1Start = currentRotation;
  const p1End = p1Start + 4 * 360;
  await animateRotation(p1Start, p1End, 3500, easeInCubic);

  const p2Start = currentRotation;
  const p2End = p2Start + 360;
  await animateRotation(p2Start, p2End, 700, linear);

  setBoolean("slow_down", true);

  await new Promise(resolve => {
    requestAnimationFrame(() => requestAnimationFrame(resolve));
  });

  const randomAngle = Math.random() * 360;
  const p3Start = currentRotation;
  const p3End = p3Start + 3 * 360 + randomAngle;

  await animateRotation(p3Start, p3End, 5200, easeOutQuart);

  // Now the wheel has stopped - set the final angle and lock it
  const finalAngle = normalizeAngle(currentRotation);
  lockedAngle = finalAngle;
  rewardLocked = true;

  const selectedSlot = getSlotFromAngle(finalAngle);

  setSelectedReward(selectedSlot);

  // Set stop_spin AFTER wheel has stopped and reward is set
  setBoolean("stop_spin", true);

  fireTrigger(`won${selectedSlot}`);

  console.log("finalAngle:", finalAngle);
  console.log("selectedSlot:", selectedSlot);
  console.log("fired:", `won${selectedSlot}`);

  // Keep enforcing the final rotation for a period
  let lockFrames = 0;

  function lockRewardRotation() {
    setNumber("rotation", lockedAngle);

    lockFrames++;
    if (lockFrames < 300) {
      requestAnimationFrame(lockRewardRotation);
    } else {
      isSpinning = false;
    }
  }

  requestAnimationFrame(lockRewardRotation);
}

// -------------------------
// Rive init
// -------------------------
riveInstance = new rive.Rive({
  src: "lucky_wheel1.riv",
  canvas,
  artboard: "wheeloffortune",
  stateMachines: "State Machine 2",
  autoplay: true,
  autoBind: true,

  onLoad: () => {
    riveInstance.resizeDrawingSurfaceToCanvas();

    requestAnimationFrame(() => {
      riveContainer.classList.add("loaded");
      preloader.classList.add("hidden");
    });

    vmi = riveInstance.viewModelInstance;

    if (!vmi) {
      console.error("No bound ViewModelInstance found.");
      return;
    }

    injectRewards();

    currentRotation = 0;
    lastEdgeIndex = -1;
    rewardLocked = false;
    lockedAngle = 0;

    setWheelRotation(0, false);

    setBoolean("slow_down", false);
    setBoolean("stop_spin", false);

    canvas.addEventListener("click", startSpin);
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      startSpin();
    });

    console.log("Rive ready");
  },

  onLoadError: err => {
    console.error("Rive load error:", err);
  }
});

window.addEventListener("resize", () => {
  if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
});
</script>
</body>
</html>
