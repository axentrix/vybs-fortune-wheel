<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rive Wheel</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
}

.rive-container {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.35s ease;
}

.rive-container.loaded {
  opacity: 1;
}

#riveCanvas {
  height: 80vh;
  width: auto;
  max-width: 100%;
  display: block;
}

.preloader {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0f0f;
  z-index: 10;
  transition: opacity 0.35s ease, visibility 0.35s ease;
}

.preloader.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loader-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid rgba(255,255,255,0.18);
  border-top-color: #ffffff;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

.loader-text {
  color: #ffffff;
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.85;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>
<div class="page">
  <div class="preloader" id="preloader">
    <div class="loader-wrap">
      <div class="spinner"></div>
      <div class="loader-text">Loading</div>
    </div>
  </div>

  <div class="rive-container" id="riveContainer">
    <canvas id="riveCanvas"></canvas>
  </div>
</div>

<script src="https://unpkg.com/@rive-app/webgl2"></script>
<script>
const canvas = document.getElementById("riveCanvas");
const preloader = document.getElementById("preloader");
const riveContainer = document.getElementById("riveContainer");

const rewards = [
  { reward_type: "dollars", reward_number: "$1" },
  { reward_type: "dollars", reward_number: "$2" },
  { reward_type: "dollars", reward_number: "$3" },
  { reward_type: "dollars", reward_number: "$4" },
  { reward_type: "dollars", reward_number: "$5" },
  { reward_type: "dollars", reward_number: "$6" },
  { reward_type: "dollars", reward_number: "$7" },
  { reward_type: "dollars", reward_number: "$8" }
];

let riveInstance;
let vmi;
let stateMachine;

let isSpinning = false;
let currentRotation = 0;
let lastEdgeIndex = -1;

let rewardLocked = false;
let lockedAngle = 0;

const SLOT_OFFSET = 22.5; // Align edges with yellow dots (half slot = 22.5°)

// -------------------------
// ViewModel helpers
// -------------------------
function setString(path, value) {
  const prop = vmi?.string(path);
  if (prop) prop.value = String(value);
  else console.warn("Missing string:", path);
}

function setNumber(path, value) {
  if (path === "rotation") {
    if (rewardLocked) {
      console.log("LOCKED - Blocking Rive rotation change from", value, "keeping", lockedAngle);
      value = lockedAngle;
    } else {
   
    }
  }

  const prop = vmi?.number(path);
  if (prop) prop.value = Number(value);
  else console.warn("Missing number:", path);
}

function setBoolean(path, value) {
  const prop = vmi?.boolean(path);
  if (prop) prop.value = Boolean(value);
  else console.warn("Missing boolean:", path);
}

function fireTrigger(path) {
  const prop = vmi?.trigger(path);
  if (prop) prop.trigger();
  else console.warn("Missing trigger:", path);
}

// -------------------------
// Rewards
// -------------------------
function injectRewards() {
  rewards.forEach((reward, index) => {
    const slot = index + 1;
    setString(`slot${slot}/reward_type`, reward.reward_type);
    setString(`slot${slot}/reward_number`, reward.reward_number);
  });

  console.log("Rewards populated");
}

function setSelectedReward(slot) {
  const reward = rewards[slot - 1];

  setNumber("selected_index", slot);
  setString("selectedSlot/reward_type", reward.reward_type);
  setString("selectedSlot/reward_number", reward.reward_number);

  console.log("JS selected reward:", slot, reward);
}

// -------------------------
// Easing
// -------------------------
function easeInCubic(t) {
  return t * t * t;
}

function linear(t) {
  return t;
}

function easeOutQuart(t) {
  return 1 - Math.pow(1 - t, 4);
}

function easeOutBack(t) {
  const c1 = 0.3; // Much smaller = less overshoot (just a few degrees)
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

// -------------------------
// Rotation
// -------------------------
function normalizeAngle(value) {
  return ((value % 360) + 360) % 360;
}

let currentTickSpeed = 1.0;

function setWheelRotation(value, allowTick = true, tickSpeed = 1.0) {
  const oldRotation = currentRotation;
  currentRotation = value;
  currentTickSpeed = tickSpeed;

  const displayRotation = normalizeAngle(value);
  setNumber("rotation", displayRotation);

  // Fire tick based on actual distance traveled (naturally slows with wheel)
  if (allowTick) {
    const distanceTraveled = Math.abs(value - oldRotation);
    const tickThreshold = 45; // Fire tick every 45 degrees
    
    const oldEdge = Math.floor(oldRotation / tickThreshold);
    const newEdge = Math.floor(value / tickThreshold);
    
    if (newEdge !== oldEdge && newEdge !== lastEdgeIndex) {
      lastEdgeIndex = newEdge;
      // Fire tick with speed information
      fireTick();
      console.log("Tick fired at speed:", tickSpeed.toFixed(2));
    }
  }
}

let lastSlowTickFired = false;

function animateRotation(from, to, duration, ease, useSlowTickAtEnd = false) {
  return new Promise(resolve => {
    const startTime = performance.now();
    const totalDistance = to - from;
    let lastT = 0;
    lastSlowTickFired = false;

    function frame(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      const eased = ease(t);
      const value = from + totalDistance * eased;

      // Calculate current velocity to control state machine speed
      const deltaT = t - lastT;
      const velocity = deltaT > 0 ? deltaT : 1;
      
      // Slow down state machine as wheel decelerates (t approaches 1, velocity decreases)
      const stateMachineSpeed = Math.max(0.15, Math.min(1, velocity * 100));
      
      // Control Rive animation speed
      if (stateMachine && stateMachine.speed !== undefined) {
        stateMachine.speed = stateMachineSpeed;
      }

      // Check if we should fire slow tick (when within last 8° and haven't fired yet)
      const distanceRemaining = to - value;
      if (useSlowTickAtEnd && !lastSlowTickFired && distanceRemaining < 8 && distanceRemaining > 0) {
        console.log("Firing SLOW tick during final approach (8° remaining)");
        fireTick(true);
        lastSlowTickFired = true;
        // Don't fire regular ticks anymore
        setWheelRotation(value, false);
      } else if (useSlowTickAtEnd && lastSlowTickFired) {
        // After slow tick fired, no more automatic ticks
        setWheelRotation(value, false);
      } else {
        // Normal automatic ticks
        setWheelRotation(value, true);
      }
      
      lastT = t;

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        // Reset state machine speed
        if (stateMachine) {
          stateMachine.speed = 1;
        }
        resolve();
      }
    }

    requestAnimationFrame(frame);
  });
}

function getSlotFromAngle(angle) {
  let a = ((angle + SLOT_OFFSET) % 360 + 360) % 360;
  a = (a + 22.5) % 360;
  return Math.floor(a / 45) + 1;
}

function fireTick(slow = false) {
  if (slow) {
    fireTrigger("tick_slow");
  } else {
    fireTrigger("tick");
  }
}

// -------------------------
// Spin
// -------------------------
async function startSpin() {
  if (!vmi || isSpinning) return;

  isSpinning = true;
  rewardLocked = false;
  lockedAngle = 0;
  lastEdgeIndex = -1;

  // Ensure we're in a clean state before starting
  setBoolean("slow_down", false);
  setBoolean("stop_spin", false);
  
  // Wait for state to settle if this is first spin
  await new Promise(resolve => setTimeout(resolve, 50));

  fireTrigger("click");

  // Single smooth spin: several loops + slowdown with integrated settling
  const slotSize = 45;
  let randomAngle = Math.random() * 360;
  
  // Decide if we should settle to an edge (60% chance)
  const shouldSettleToEdge = Math.random() < 0.6;
  if (shouldSettleToEdge) {
    // Find nearest edge to the random angle
    const nearestEdge = Math.round(randomAngle / slotSize) * slotSize;
    // Target slightly BEFORE the edge so easeOutBack overshoots PAST it
    // This way the tick fires as it crosses the edge while overshooting
    randomAngle = nearestEdge - 3; // 3 degrees before edge
  }
  
  const spinStart = currentRotation;
  const spinEnd = spinStart + 7 * 360 + randomAngle;

  // Use easeOutBack if targeting an edge (creates natural bounce-back)
  // Use easeOutQuart if not (smooth stop)
  const easingFunction = shouldSettleToEdge ? easeOutBack : easeOutQuart;

  // Much slower deceleration - 8.5 seconds total
  // Slow tick fires automatically during final 45° if targeting edge
  await animateRotation(spinStart, spinEnd, 8500, easingFunction, shouldSettleToEdge);

  // Wait a moment for Rive to fully apply the final rotation
  await new Promise(resolve => setTimeout(resolve, 100));

  // Read the ACTUAL rotation from Rive, not from JavaScript
  const rotationProp = vmi?.number("rotation");
  const riveAngle = rotationProp?.value || 0;
  const normalizedAngle = normalizeAngle(riveAngle);
  const calculatedSlot = getSlotFromAngle(normalizedAngle);
  
  // Apply the correct mapping: slot X maps to reward (10-X) with wraparound
  const selectedSlot = ((10 - calculatedSlot) % 9) || 1;

  console.log("=== SLOT CALCULATION DEBUG ===");
  console.log("JS currentRotation:", currentRotation);
  console.log("Rive actual rotation:", riveAngle);
  console.log("Normalized angle:", normalizedAngle);
  console.log("Raw angle range:", Math.floor(normalizedAngle / 45));
  console.log("With offset:", (normalizedAngle + SLOT_OFFSET) % 360);
  console.log("Selected slot:", selectedSlot);
  console.log("PLEASE CHECK: What slot NUMBER is visually under the pointer?");
  console.log("==============================");

  // Lock the rotation at the RIVE value, not JS value
  lockedAngle = normalizedAngle;
  rewardLocked = true;

  // Start monitoring rotation changes
  let monitorCount = 0;
  function monitorRotation() {
    const currentRive = rotationProp?.value || 0;
   
    monitorCount++;
    if (monitorCount < 60) {
      requestAnimationFrame(monitorRotation);
    } else {
      isSpinning = false;
    }
  }

  // Set reward data first
  setSelectedReward(selectedSlot);

  console.log("About to set stop_spin=true, rotation is:", normalizedAngle);

  // Start monitoring
  requestAnimationFrame(monitorRotation);

  // Enforce rotation multiple times before triggering stop_spin
  for (let i = 0; i < 20; i++) {
    setNumber("rotation", lockedAngle);
  }

  // Now trigger reward state
  setBoolean("stop_spin", true);
  fireTrigger(`won${selectedSlot}`);

  console.log("fired:", `won${selectedSlot}`);
}

// -------------------------
// Rive init
// -------------------------
riveInstance = new rive.Rive({
  src: "lucky_wheel1.riv",
  canvas,
  artboard: "wheeloffortune",
  stateMachines: "State Machine 2",
  autoplay: true,
  autoBind: true,

  onLoad: () => {
    riveInstance.resizeDrawingSurfaceToCanvas();

    requestAnimationFrame(() => {
      riveContainer.classList.add("loaded");
      preloader.classList.add("hidden");
    });

    vmi = riveInstance.viewModelInstance;

    if (!vmi) {
      console.error("No bound ViewModelInstance found.");
      return;
    }

    // Get state machine instance for speed control
    const animator = riveInstance._animator;
    if (animator && animator._playing) {
      stateMachine = animator._playing[0];
      console.log("State machine found:", stateMachine);
    } else {
      console.warn("Could not access state machine for speed control");
    }

    injectRewards();

    currentRotation = 0;
    lastEdgeIndex = -1;
    rewardLocked = false;
    lockedAngle = 0;

    setWheelRotation(0, false);

    setBoolean("slow_down", false);
    setBoolean("stop_spin", false);

    canvas.addEventListener("click", startSpin);
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      startSpin();
    });

    console.log("Rive ready");
  },

  onLoadError: err => {
    console.error("Rive load error:", err);
  }
});

window.addEventListener("resize", () => {
  if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
});
</script>
</body>
</html>
